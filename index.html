<!DOCTYPE html>
<html>
<head>
    <title>AWS RDS MySQL Table Manager</title>

    <style>

        body{
            font-family: Arial;
            width: 1000px;
            margin: 30px auto;
        }

        h2{
            color:#333;
        }

        .box{
            border:1px solid #ccc;
            padding:20px;
            margin-bottom:20px;
            border-radius:5px;
        }

        input{
            padding:10px;
            margin:5px;
            width:250px;
        }

        button{
            padding:10px 15px;
            border:none;
            background:#007bff;
            color:white;
            cursor:pointer;
        }

        button:hover{
            background:#0056b3;
        }

        iframe{
            width:100%;
            height:600px;
            border:none;
        }

    </style>

</head>

<body>

<h2>AWS RDS MySQL CRUD + Table Operations</h2>

<!-- CREATE TABLE -->

<div class="box">

<h3>Create Table</h3>

<form action="crud.php" method="POST">

    <input type="text"
           name="table_name"
           placeholder="Table Name"
           required>

    <button type="submit" name="create_table">
        Create Table
    </button>

</form>

</div>

<!-- RENAME TABLE -->

<div class="box">

<h3>Rename Table</h3>

<form action="crud.php" method="POST">

    <input type="text"
           name="old_table"
           placeholder="Old Table Name"
           required>

    <input type="text"
           name="new_table"
           placeholder="New Table Name"
           required>

    <button type="submit" name="rename_table">
        Rename Table
    </button>

</form>

</div>

<!-- DELETE TABLE -->

<div class="box">

<h3>Delete Table</h3>

<form action="crud.php" method="POST">

    <input type="text"
           name="delete_table_name"
           placeholder="Table Name"
           required>

    <button type="submit" name="delete_table">
        Delete Table
    </button>

</form>

</div>

<!-- INSERT DATA -->

<div class="box">

<h3>Insert Data</h3>

<form action="crud.php" method="POST">

    <input type="text"
           name="insert_table"
           placeholder="Table Name"
           required>

    <input type="text"
           name="name"
           placeholder="Name"
           required>

    <input type="email"
           name="email"
           placeholder="Email"
           required>

    <button type="submit" name="insert_data">
        Insert Data
    </button>

</form>

</div>

<!-- FETCH DATA -->

<div class="box">

<h3>Fetch Table Data</h3>

<form action="crud.php" method="GET">

    <input type="text"
           name="fetch_table"
           placeholder="Table Name"
           required>

    <button type="submit">
        Fetch Data
    </button>

</form>

</div>

<hr>

<iframe src="crud.php"></iframe>

</body>
</html>
